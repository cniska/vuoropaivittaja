<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vuoropäivittäjä</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <div class="columns">

      <main class="column-left">

        <header class="header">
          <h1 class="app-name">Vuoropäivittäjä</h1>
        </header>

        <section class="section" aria-labelledby="settings-heading">
          <h2 id="settings-heading" class="section-label">Asetukset</h2>

          <div class="toggles">
            <label class="toggle">
              <input id="enabled" type="checkbox">
              <span class="toggle-text">Seuranta päällä</span>
              <span class="toggle-track" aria-hidden="true"><span class="toggle-thumb"></span></span>
            </label>
            <label class="toggle">
              <input id="notifications" type="checkbox">
              <span class="toggle-text">Ilmoitukset</span>
              <span class="toggle-track" aria-hidden="true"><span class="toggle-thumb"></span></span>
            </label>
            <label class="toggle">
              <input id="sound" type="checkbox">
              <span class="toggle-text">Äänimerkki</span>
              <span class="toggle-track" aria-hidden="true"><span class="toggle-thumb"></span></span>
            </label>
          </div>

          <div class="field">
            <p id="interval-label" class="field-label">Päivitysväli (s)</p>
            <div class="interval-row" role="group" aria-labelledby="interval-label">
              <div class="interval-input">
                <span class="interval-prefix" aria-hidden="true">Min</span>
                <input id="min-interval" type="number" min="5" step="1" value="30" aria-label="Minimiväli sekunneissa">
              </div>
              <div class="interval-input">
                <span class="interval-prefix" aria-hidden="true">Max</span>
                <input id="max-interval" type="number" min="2" step="1" value="90" aria-label="Maksimiväli sekunneissa">
              </div>
            </div>
          </div>
        </section>

        <section class="section" aria-labelledby="target-heading">
          <h2 id="target-heading" class="section-label">Kohde</h2>

          <div class="field">
            <label for="selector" class="field-label">Painikkeen valitsin</label>
            <input id="selector" type="text" class="text-input" placeholder="(//button[@aria-label='Päivitä luettelo'])[2]">
            <div class="row-actions">
              <button id="pick-element" type="button" class="secondary-button">Valitse sivulta</button>
              <button id="test-selector" type="button" class="secondary-button">Testaa</button>
            </div>
          </div>
        </section>

        <footer class="autosave-notice">
          Muutokset tallentuvat automaattisesti
        </footer>

        <p id="status" class="toast" role="status" aria-live="polite" aria-atomic="true"></p>
      </main>

      <aside class="column-right" aria-labelledby="history-heading">
        <header class="header">
          <h2 id="history-heading" class="app-name">Vuorot</h2>
          <button id="clear-history" type="button" class="header-action" aria-label="Tyhjennä vuorohistoria">Tyhjennä</button>
        </header>

        <div id="history-list" class="history-list" role="list" aria-live="polite" aria-relevant="additions removals">
          <p class="history-empty">Ei tallennettuja vuoroja.</p>
        </div>
      </aside>

    </div>

    <script src="src/shared.js"></script>
    <script src="src/popup-helpers.js"></script>
    <script src="src/popup.js"></script>
  </body>
</html>
