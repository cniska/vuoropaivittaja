<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vuoropäivittäjä</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app">

      <section class="section">
        <p class="section-title">Asetukset</p>

        <div class="toggles">
          <label class="toggle">
            <input id="enabled" type="checkbox">
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            <span class="toggle-label">Tarkkailu päällä</span>
          </label>
          <label class="toggle">
            <input id="notifications" type="checkbox">
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            <span class="toggle-label">Työpöytäilmoitus</span>
          </label>
          <label class="toggle">
            <input id="sound" type="checkbox">
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            <span class="toggle-label">Äänimerkki</span>
          </label>
        </div>

        <div class="field">
          <label>Päivitysväli (s)</label>
          <div class="interval-row">
            <div class="interval-field">
              <span class="interval-label">Min</span>
              <input id="min-interval" type="number" min="2" step="1" value="30">
            </div>
            <div class="interval-field">
              <span class="interval-label">Max</span>
              <input id="max-interval" type="number" min="2" step="1" value="90">
            </div>
          </div>
        </div>
      </section>

      <section class="section">
        <p class="section-title">Kohde</p>

        <div class="field">
          <label>Seurattava sivu</label>
          <p id="target-url-display" class="site-display">Ei asetettu</p>
          <button id="set-current-site" type="button" class="secondary-button">Aseta nykyinen sivu</button>
        </div>

        <div class="field">
          <label for="selector">Painikkeen valitsin</label>
          <input id="selector" type="text" placeholder='button[aria-label="Päivitä luettelo"]'>
          <div class="field-actions">
            <button id="pick-element" type="button" class="secondary-button">Valitse sivulta</button>
            <button id="test-selector" type="button" class="secondary-button">Testaa</button>
          </div>
        </div>
      </section>

      <div class="footer">
        <button id="save" type="button" class="primary-button">Tallenna</button>
        <p id="status" class="status" role="status"></p>
      </div>

    </main>

    <script src="shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
