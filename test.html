<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Auto Clicker — Test Page</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
        margin: 0;
        background: #f5f5f5;
      }

      .card {
        background: white;
        border-radius: 16px;
        padding: 40px 48px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        text-align: center;
        display: grid;
        gap: 24px;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        color: #111;
      }

      #click-count {
        font-size: 64px;
        font-weight: 700;
        color: #c84f1c;
        line-height: 1;
      }

      #target-button {
        padding: 14px 28px;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 999px;
        background: #c84f1c;
        color: white;
        cursor: pointer;
        transition: background 0.15s;
      }

      #target-button:hover {
        background: #913012;
      }

      .hint {
        font-size: 13px;
        color: #888;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Auto Clicker — Test Page</h1>
      <div id="click-count">0</div>
      <button id="target-button" data-testid="target-button" type="button">Click me</button>
      <p class="hint">
        URL pattern: <code>test.html</code><br>
        Selector: <code>button[data-testid="target-button"]</code>
      </p>
    </div>
    <script>
      const button = document.getElementById("target-button");
      const count = document.getElementById("click-count");
      let clicks = 0;
      button.addEventListener("click", () => {
        clicks += 1;
        count.textContent = clicks;
      });
    </script>
  </body>
</html>
