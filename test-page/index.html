<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vuoropäivittäjä · Testisivu</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: system-ui, sans-serif;
        font-size: 13px;
        background: #f8fafc;
        color: #0f172a;
        min-height: 100vh;
      }

      /* Dev toolbar */
      .toolbar {
        background: #fff;
        border-bottom: 1px solid #e2e8f0;
        padding: 8px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 12px;
        color: #64748b;
      }

      .toolbar strong {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #94a3b8;
      }

      #state-label { margin-left: auto; }

      /* Page */
      .page {
        max-width: 680px;
        margin: 28px auto;
        padding: 0 16px;
      }

      /* App card */
      .card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        overflow: hidden;
      }

      .card-header {
        padding: 12px 16px;
        border-bottom: 1px solid #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .card-title {
        font-size: 13px;
        font-weight: 600;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .refresh-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        background: #eff6ff;
        color: #2563eb;
        border: none;
        border-radius: 6px;
        padding: 6px 12px;
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }

      .refresh-btn:hover { background: #dbeafe; }

      .refresh-btn svg {
        width: 13px;
        height: 13px;
        fill: currentColor;
      }

      /* Slot list */
      .slot-list { display: flex; flex-direction: column; }

      .slot-item {
        display: grid;
        grid-template-columns: 90px 160px 1fr;
        align-items: center;
        padding: 10px 16px;
        border-bottom: 1px solid #f1f5f9;
        gap: 12px;
        animation: fadeIn 0.15s ease;
      }

      .slot-item:last-child { border-bottom: none; }

      .slot-date { color: #64748b; }
      .slot-weekday { font-weight: 500; }
      .slot-time { }
      .slot-badge {
        display: inline-block;
        margin-left: 8px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #15803d;
        background: #f0fdf4;
        border-radius: 4px;
        padding: 1px 5px;
      }

      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

      .empty-state {
        padding: 32px 16px;
        text-align: center;
        color: #94a3b8;
      }

      .card-footer {
        border-top: 1px solid #e2e8f0;
        padding: 8px 16px;
        font-size: 11px;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <strong>Testipaneeli</strong>
      <span id="click-log">Klikkauksia: 0</span>
      <span id="state-label"></span>
    </div>

    <div class="page">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Varattavat vuorot</span>
          <button
            class="refresh-btn"
            aria-label="Päivitä vuorolista"
            data-control-name="refresh_button"
          >
            <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
              <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
            </svg>
            Päivitä luettelo
          </button>
        </div>

        <div role="list" aria-label="Vuorolista" class="slot-list">
          <!-- rendered by JS -->
        </div>

        <div class="card-footer" id="click-log-footer">Klikkauksia: 0</div>
      </div>
    </div>

    <script>
      const INITIAL_SLOTS = [
        { date: "26.5.2026", weekday: "(01) Maanantai", shift: "06.00 - 14.00" },
        { date: "26.5.2026", weekday: "(01) Maanantai", shift: "14.00 - 22.00" },
        { date: "27.5.2026", weekday: "(02) Tiistai",   shift: "08.00 - 16.00" },
        { date: "27.5.2026", weekday: "(02) Tiistai",   shift: "16.00 - 00.00" },
        { date: "28.5.2026", weekday: "(03) Keskiviikko", shift: "06.00 - 14.00" },
        { date: "28.5.2026", weekday: "(03) Keskiviikko", shift: "14.00 - 22.00" },
        { date: "29.5.2026", weekday: "(04) Torstai",   shift: "08.00 - 16.00" },
        { date: "29.5.2026", weekday: "(04) Torstai",   shift: "16.00 - 00.00" },
        { date: "30.5.2026", weekday: "(05) Perjantai", shift: "06.00 - 14.00" },
        { date: "30.5.2026", weekday: "(05) Perjantai", shift: "14.00 - 22.00" },
        { date: "31.5.2026", weekday: "(06) Lauantai",  shift: "09.00 - 17.00" },
        { date: "1.6.2026",  weekday: "(07) Sunnuntai", shift: "10.00 - 18.00" },
        { date: "2.6.2026",  weekday: "(01) Maanantai", shift: "06.00 - 14.00" },
        { date: "3.6.2026",  weekday: "(02) Tiistai",   shift: "08.00 - 16.00" },
        { date: "4.6.2026",  weekday: "(03) Keskiviikko", shift: "14.00 - 22.00" },
        { date: "5.6.2026",  weekday: "(04) Torstai",   shift: "06.00 - 14.00" },
        { date: "6.6.2026",  weekday: "(05) Perjantai", shift: "08.00 - 16.00" },
        { date: "7.6.2026",  weekday: "(06) Lauantai",  shift: "09.00 - 17.00" },
        { date: "8.6.2026",  weekday: "(07) Sunnuntai", shift: "10.00 - 18.00" },
        { date: "9.6.2026",  weekday: "(01) Maanantai", shift: "14.00 - 22.00" },
        { date: "10.6.2026", weekday: "(02) Tiistai",   shift: "06.00 - 14.00" },
        { date: "11.6.2026", weekday: "(03) Keskiviikko", shift: "08.00 - 16.00" },
      ];

      const UPCOMING_SLOTS = [
        { date: "12.6.2026", weekday: "(04) Torstai",   shift: "06.00 - 14.00" },
        { date: "12.6.2026", weekday: "(04) Torstai",   shift: "14.00 - 22.00" },
        { date: "13.6.2026", weekday: "(05) Perjantai", shift: "08.00 - 16.00" },
        { date: "14.6.2026", weekday: "(06) Lauantai",  shift: "09.00 - 17.00" },
        { date: "15.6.2026", weekday: "(07) Sunnuntai", shift: "10.00 - 18.00" },
        { date: "16.6.2026", weekday: "(01) Maanantai", shift: "14.00 - 22.00" },
      ];

      const ARRIVAL_PATTERN = [true, false, true, false, true, false];

      const visibleSlots = INITIAL_SLOTS.map((s) => ({ ...s }));
      const pendingSlots = [];
      let arrivalIndex = 0;
      let clickCount = 0;

      function renderSlots() {
        const list = document.querySelector('[role="list"]');
        if (visibleSlots.length === 0) {
          list.innerHTML = '<div class="empty-state">Ei saatavilla olevia vuoroja.</div>';
          return;
        }
        list.innerHTML = visibleSlots
          .map(
            (s) => `<div role="listitem" class="slot-item">
              <span class="slot-date">${s.date}</span>
              <span class="slot-weekday">${s.weekday}</span>
              <span class="slot-time">${s.shift}${s.isNew ? '<span class="slot-badge">Uusi</span>' : ""}</span>
            </div>`
          )
          .join("");
        updateStatus();
      }

      function updateStatus(msg = "") {
        document.getElementById("state-label").textContent =
          pendingSlots.length > 0
            ? `Uusia vuoroja odottaa: ${pendingSlots.length}`
            : msg || "";
        const log = `Klikkauksia: ${clickCount}`;
        document.getElementById("click-log").textContent = log;
        document.getElementById("click-log-footer").textContent = log;
      }

      function queueIncomingSlot() {
        if (!ARRIVAL_PATTERN[arrivalIndex % ARRIVAL_PATTERN.length]) {
          arrivalIndex++;
          return;
        }
        arrivalIndex++;
        const next = UPCOMING_SLOTS.shift();
        if (!next) { clearInterval(arrivalTimer); return; }
        pendingSlots.push({ ...next, isNew: true });
        updateStatus();
      }

      function handleRefresh() {
        clickCount++;
        if (pendingSlots.length > 0) {
          visibleSlots.unshift(...pendingSlots);
          pendingSlots.length = 0;
        }
        renderSlots();
        updateStatus();
      }

      const refreshBtn = document.querySelector(".refresh-btn");
      refreshBtn.addEventListener("click", handleRefresh);
      refreshBtn.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); handleRefresh(); }
      });

      const arrivalTimer = window.setInterval(queueIncomingSlot, 12000);

      renderSlots();
      updateStatus();
    </script>
  </body>
</html>
