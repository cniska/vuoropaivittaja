<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vuoropäivittäjä · Testisivu</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #f8fafc;
        color: #1e293b;
        min-height: 100vh;
      }

      .control-panel {
        background: #ffffff;
        color: #1e293b;
        padding: 10px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        font-size: 12px;
        border-bottom: 1px solid #e2e8f0;
      }

      .control-panel strong {
        margin-right: 6px;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-size: 11px;
      }

      #state-label {
        margin-left: auto;
        color: #64748b;
        font-size: 12px;
      }

      .page {
        max-width: 760px;
        margin: 24px auto;
        padding: 0 16px 24px;
      }

      h1 {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 6px;
      }

      .subtitle {
        color: #64748b;
        font-size: 13px;
        margin-bottom: 20px;
      }

      .app-wrapper {
        background: #ffffff;
        border-radius: 8px;
        border: 1px solid #e2e8f0;
        overflow: hidden;
      }

      .app-header {
        padding: 16px 20px;
        border-bottom: 1px solid #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .app-title {
        font-size: 15px;
        font-weight: 600;
      }

      .refresh-button {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: #2563eb;
        color: #fff;
        border-radius: 6px;
        padding: 7px 14px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        user-select: none;
        transition: background 0.15s, transform 0.1s;
        outline-offset: 2px;
      }

      .refresh-button:hover {
        background: #1d4ed8;
      }

      .refresh-button:active {
        transform: scale(0.97);
      }

      .refresh-button:focus-visible {
        outline: 2px solid #2563eb;
        outline-offset: 3px;
      }

      .refresh-button svg {
        width: 15px;
        height: 15px;
        fill: currentColor;
      }

      .slot-list {
        padding: 14px 20px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-height: 120px;
      }

      .slot-item {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        padding: 12px 16px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
        animation: fadeIn 0.2s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .slot-heading {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .slot-weekday {
        font-weight: 600;
        font-size: 13px;
      }

      .slot-date,
      .slot-time {
        font-weight: 500;
        font-size: 13px;
      }

      .slot-time {
        color: #334155;
      }

      .slot-badge {
        display: inline-block;
        background: #dcfce7;
        color: #15803d;
        border-radius: 999px;
        padding: 2px 10px;
        font-size: 11px;
        font-weight: 600;
        margin-left: 10px;
      }

      .empty-state {
        color: #94a3b8;
        font-size: 13px;
        text-align: center;
        padding: 28px;
      }

      .click-log {
        border-top: 1px solid #e2e8f0;
        padding: 10px 20px;
        font-size: 12px;
        color: #94a3b8;
        min-height: 40px;
      }
    </style>
  </head>
  <body>
    <div class="control-panel">
      <strong>Testipaneeli</strong>
      <span id="state-label"></span>
    </div>

    <div class="page">
      <h1>Vapaavuorovaraus</h1>
      <p class="subtitle">Simuloi PowerApps-sovelluksen vuorolistaa.</p>

      <div class="app-wrapper" data-testid="vuoro-app">
        <div class="app-header">
          <span class="app-title">Saatavilla olevat vuorot</span>
          <div
            role="button"
            data-control-name="refresh_button"
            aria-label="Päivitä vuorolista"
            class="refresh-button"
            tabindex="0"
          >
            <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
              <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
            </svg>
            Päivitä
          </div>
        </div>

        <div role="list" aria-label="Vuorolista" data-testid="vuoro-lista" class="slot-list">
          <!-- rendered by JS -->
        </div>

        <div class="click-log" id="click-log">Klikkauksia: 0</div>
      </div>
    </div>

    <script>
      const INITIAL_SLOTS = [
        { weekday: "Ke", date: "28.5.", shift: "06:00–14:00", isNew: false },
        { weekday: "Ti", date: "27.5.", shift: "12:00–20:00", isNew: false },
        { weekday: "Ma", date: "26.5.", shift: "08:00–16:00", isNew: false },
      ];

      const UPCOMING_SLOTS = [
        { weekday: "La", date: "31.5.", shift: "09:00–15:00" },
        { weekday: "Pe", date: "30.5.", shift: "14:00–22:00" },
        { weekday: "To", date: "29.5.", shift: "10:00–18:00" },
      ];

      const ARRIVAL_PATTERN = [true, false, true, false, true, false];

      const visibleSlots = INITIAL_SLOTS.map((slot) => ({ ...slot }));
      const pendingSlots = [];
      let arrivalIndex = 0;
      let clickCount = 0;

      function renderSlots() {
        const list = document.querySelector('[role="list"]');
        const slots = visibleSlots;

        if (slots.length === 0) {
          list.innerHTML = '<div class="empty-state">Ei saatavilla olevia vuoroja.</div>';
        } else {
          list.innerHTML = slots
            .map(
              (slot) => `
            <div role="listitem" class="slot-item">
              <div class="slot-heading">
                <span class="slot-weekday">${slot.weekday}</span>
                <span class="slot-date">${slot.date}</span>
                ${slot.isNew ? '<span class="slot-badge">Uusi</span>' : ""}
              </div>
              <div class="slot-time">${slot.shift}</div>
            </div>
          `
            )
            .join("");
        }

        updateStatus();
      }

      function updateStatus(extraMessage = "") {
        document.getElementById("state-label").textContent =
          pendingSlots.length > 0
            ? `Uusia vuoroja odottaa: ${pendingSlots.length}`
            : "Ei uusia vuoroja juuri nyt";
        document.getElementById("click-log").textContent = extraMessage
          ? `Klikkauksia: ${clickCount} — ${extraMessage}`
          : `Klikkauksia: ${clickCount}`;
      }

      const refreshBtn = document.querySelector('[role="button"]');

      function queueIncomingSlot() {
        const shouldQueueSlot = ARRIVAL_PATTERN[arrivalIndex % ARRIVAL_PATTERN.length];
        arrivalIndex += 1;

        if (!shouldQueueSlot) {
          updateStatus("ei uusia vuoroja juuri nyt");
          return;
        }

        const nextSlot = UPCOMING_SLOTS.shift();
        if (!nextSlot) {
          clearInterval(arrivalTimer);
          updateStatus("uusia vuoroja ei ole tulossa");
          return;
        }

        pendingSlots.push({ ...nextSlot, isNew: true });
        updateStatus("uusi vuoro odottaa päivitystä");
      }

      function flushPendingSlots() {
        if (pendingSlots.length === 0) {
          return false;
        }

        visibleSlots.unshift(...pendingSlots);
        pendingSlots.length = 0;
        return true;
      }

      function handleRefreshClick() {
        clickCount += 1;
        const hadPendingSlots = flushPendingSlots();
        renderSlots();
        updateStatus(
          hadPendingSlots
            ? "uudet vuorot lisättiin listan alkuun"
            : "ei uusia vuoroja vielä"
        );
      }

      refreshBtn.addEventListener("click", handleRefreshClick);

      refreshBtn.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          handleRefreshClick();
        }
      });

      const arrivalTimer = window.setInterval(queueIncomingSlot, 12000);

      renderSlots();
      updateStatus();
    </script>
  </body>
</html>
